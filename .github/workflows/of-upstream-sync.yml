name: of-upstream-sync

# OpenFathom delta — allowed by ADR-002. Weekly sync of the `cloudrun` branch
# onto NousResearch/hermes-agent:main, so fork divergence stays bounded (the
# whole reason ADR-002 chose "fork + weekly sync" over vendoring or a submodule).
#
# Filename is `of-upstream-sync.yml`, not the `upstream-sync.yml` ADR-002 lists
# verbatim -- this repo's own .github/workflows/ already carries upstream's own
# workflow files, and an `of-` prefix means a future upstream file with the same
# short name can never collide during the weekly rebase. Same reasoning as the
# `of-` prefix on every container/image/port this fork adds locally.
#
# Also deviates from ADR-002's literal wording on the success path: the ADR says
# "rebase succeeds -> push and tag the new image" (direct push to `cloudrun`).
# This opens a PR into `cloudrun` instead. PLAN.md's OF-03 task text already
# says "abre PR se o rebase for bem-sucedido" — a rebase that applies cleanly
# can still be semantically wrong (upstream renaming something
# cloudrun-entrypoint.sh depends on), and a force-push straight to the branch
# of-build-image.yml builds from would skip the one human look that would catch
# that. Both deviations are flagged in docs/BACKLOG.md (openfathom-meta, ENG-32)
# for an ADR-002 wording correction — real ADR/implementation mismatches, not
# silent choices.
#
# TWO PRECONDITIONS THIS FILE CANNOT ENFORCE, both of which fail silently -- no
# red run, no alert, just nothing happening (ENG-62, measured 2026-07-18):
#
#   1. `cloudrun` must be this repo's DEFAULT BRANCH. GitHub only fires `schedule`
#      from the default branch, and this workflow lives only on `cloudrun` (ADR-002
#      forbids us touching `main`, which mirrors upstream).
#   2. This workflow must be EXPLICITLY ENABLED. "When a public repository is
#      forked, scheduled workflows are disabled by default" -- GitHub Docs. Check
#      with `gh workflow list`, enable with `gh workflow enable of-upstream-sync.yml`.
#
# Also: in a public repo, GitHub auto-disables scheduled workflows after 60 days
# with no repository activity. A quiet quarter turns this off again, silently.

on:
  schedule:
    - cron: '0 3 * * 1' # Monday 03:00 UTC
  workflow_dispatch:

# `permissions:` here governs the default GITHUB_TOKEN. It still matters for the
# conflict path (`gh issue create`, which needs `issues: write`) -- the App does NOT
# carry the Issues permission, and github-actions[bot] is a visible bot, so ENG-74's
# "indistinguishable from a human" concern does not apply to that path. The push+PR
# path does NOT use GITHUB_TOKEN; it uses the App installation token minted below.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # openfathom-meta ADR-051. The FOURTH blocker ENG-62 found: GITHUB_TOKEN cannot
      # push a change to a file under `.github/workflows/`, and every upstream sync
      # touches one (`ci.yml`). `workflows` is not a valid `permissions:` scope -- it is a
      # platform restriction, not config. A GitHub App WITH the `Workflows` repository
      # permission can push workflow files; this mints a ~1h installation token from the
      # `openfathom-fork-sync` App (App ID in SYNC_APP_ID, private key in
      # SYNC_APP_PRIVATE_KEY). The token is a non-personal bot identity (closes half of
      # ENG-74) and expires on its own (no PAT-style silent-expiry failure).
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          # Check out with the App token so `git push` below authenticates as the App and
          # is allowed to push the `ci.yml` change. Without this, checkout wires the
          # default GITHUB_TOKEN into git and the push dies exactly as ENG-62 measured.
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        run: |
          git config user.name "openfathom-bot"
          git config user.email "openfathom-bot@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream main

      # No `main` fast-forward step here, deliberately. This fork's `main` carries
      # one commit of ours (99d57df, the OF-01 bootstrap of README.openfathom.md,
      # which ADR-002 lists as in-scope), so it has diverged from upstream and
      # `git merge --ff-only upstream/main` ABORTS -- the sync would have died at
      # that step every single time it fired. Measured 2026-07-18 (ENG-62): the
      # merge-base of origin/main and upstream/main is not origin/main.
      #
      # The sync never needed our `main`: what it rebases onto is upstream's tree,
      # and `upstream/main` names that directly. Dropping the step also drops a
      # `git push origin main` from a workflow that runs unattended on a public
      # fork -- less surface, same outcome. Our `main` simply stays frozen at the
      # OF-01 bootstrap; nothing reads it once `cloudrun` is the default branch.
      - name: Attempt cloudrun rebase
        id: rebase
        run: |
          branch="sync/upstream-$(date -u +%Y%m%d)"
          git checkout -b "$branch" cloudrun
          if git rebase upstream/main; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            git rebase --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Push sync branch and open PR
        if: steps.rebase.outputs.conflict == 'false'
        env:
          # App token, not GITHUB_TOKEN: this step both pushes the workflow-file change
          # (needs the App's Workflows permission) and opens the PR (needs Pull requests).
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git push origin "${{ steps.rebase.outputs.branch }}"
          gh pr create \
            --base cloudrun \
            --head "${{ steps.rebase.outputs.branch }}" \
            --title "sync: rebase cloudrun onto upstream main ($(date -u +%Y-%m-%d))" \
            --body "Automated weekly sync (ADR-002). The rebase applied without conflicts — review the upstream diff before merging. Merging into \`cloudrun\` triggers \`of-build-image.yml\`."

      - name: Open conflict issue
        if: steps.rebase.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/issue-body.md <<'EOF'
          The weekly rebase of `cloudrun` onto `upstream/main` failed with a conflict and was aborted. Resolve manually:

          ```
          git fetch upstream main
          git checkout cloudrun
          git rebase upstream/main
          # fix conflicts
          git push --force-with-lease
          ```

          See ADR-002 (openfathom-meta) for the fork-scope rule this branch must keep obeying while resolving.
          EOF
          gh issue create \
            --title "upstream-sync: rebase conflict ($(date -u +%Y-%m-%d))" \
            --body-file /tmp/issue-body.md
